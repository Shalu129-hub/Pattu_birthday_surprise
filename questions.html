<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just a Few Questions ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#fff7fa);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:750px;
    background:white;
    padding:50px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    color:#e91e63;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:35px;
    font-size:18px;
}

#question{
    color:#444;
    font-size:28px;
    margin-bottom:30px;
    line-height:1.5;
}

textarea{
    width:100%;
    height:140px;
    padding:18px;
    border:2px solid #ffc1d6;
    border-radius:15px;
    resize:none;
    font-size:17px;
    outline:none;
}

textarea:focus{
    border-color:#e91e63;
}

button{
    margin-top:25px;
    background:#e91e63;
    color:white;
    border:none;
    border-radius:30px;
    padding:15px 40px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#d81b60;
    transform:scale(1.05);
}

.progress{
    margin-top:20px;
    color:#888;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>💖 Before Your Surprise 💖</h1>

<p class="subtitle">
Answer these from your heart... ❤️
</p>

<h2 id="question"></h2>

<textarea
id="answer"
placeholder="Type your answer here..."></textarea>

<br>

<button onclick="nextQuestion()">
Next ❤️
</button>

<p id="progress" class="progress"></p>

</div>

<script>

const questions=[

"😊 Are you happy with me?",

"❤️ When did you realize you were in love with me?",

"💍 What is one thing you are expecting to build our relationship to the next level?"

];

let current=0;

showQuestion();

function showQuestion(){

document.getElementById("question").innerHTML=questions[current];

document.getElementById("progress").innerHTML=
"Question "+(current+1)+" of "+questions.length;

}

function nextQuestion(){

const answer=document.getElementById("answer").value;

localStorage.setItem("Question"+(current+1),answer);

current++;

if(current<questions.length){

document.getElementById("answer").value="";

showQuestion();

}
else{

window.location.href="video.html";

}

}

</script>

</body>
</html>
