<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just a Few Questions ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#fff7fa);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:750px;
    background:white;
    padding:50px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    color:#e91e63;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:35px;
    font-size:18px;
}

#question{
    color:#444;
    font-size:28px;
    margin-bottom:30px;
    line-height:1.5;
}

textarea{
    width:100%;
    height:140px;
    padding:18px;
    border:2px solid #ffc1d6;
    border-radius:15px;
    resize:none;
    font-size:17px;
    outline:none;
}

textarea:focus{
    border-color:#e91e63;
}

button{
    margin-top:25px;
    background:#e91e63;
    color:white;
    border:none;
    border-radius:30px;
    padding:15px 40px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#d81b60;
    transform:scale(1.05);
}

.progress{
    margin-top:20px;
    color:#888;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>💖 Before Your Surprise 💖</h1>

<p class="subtitle">
Answer these from your heart... ❤️
</p>

<h2 id="question"></h2>

<textarea
id="answer"
placeholder="Type your answer here..."></textarea>

<br>

<button id="nextBtn" onclick="nextQuestion()">
Next ❤️
</button>

<p id="progress" class="progress"></p>

<div id="summary" style="display:none; margin-top:32px; text-align:left;">
    <h2 style="color:#e91e63; margin-bottom:18px;">Your answers so far</h2>
    <div id="summaryList" style="display:flex;flex-direction:column;gap:16px"></div>
    <button id="goVideoBtn" style="margin-top:24px;">Watch the surprise video</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
