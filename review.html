<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review & Rating</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:linear-gradient(135deg,#ffd6e8,#ffeef5);font-family:'Segoe UI',sans-serif;color:#333;padding:32px;}
.container{max-width:720px;margin:0 auto;background:#fff;padding:32px;border-radius:28px;box-shadow:0 18px 45px rgba(0,0,0,0.14);}
h1{color:#d81b60;font-size:32px;margin-bottom:20px;text-align:center;}
p{font-size:16px;line-height:1.6;margin-bottom:20px;text-align:center;}
.rating-stars{display:flex;justify-content:center;gap:10px;margin-bottom:24px;}
.rating-stars button{font-size:36px;border:none;background:transparent;cursor:pointer;color:#ccc;transition:transform .2s ease;color:#ccc;}
.rating-stars button.selected{color:#ff4081;transform:scale(1.1);}
textarea{width:100%;min-height:140px;padding:16px;border:2px solid #ffd1e7;border-radius:20px;font-size:16px;resize:none;outline:none;margin-bottom:20px;}
button.submit{width:100%;background:#e91e63;color:#fff;border:none;padding:16px 0;border-radius:24px;font-size:18px;cursor:pointer;box-shadow:0 12px 24px rgba(233,30,99,0.25);transition:.25s;}
button.submit:hover{transform:translateY(-2px);}
.message{margin-top:18px;font-size:16px;text-align:center;color:#444;}
.thank-you{margin-top:18px;padding:16px 18px;border-radius:20px;background:#fff0f6;color:#c2185b;font-size:17px;text-align:center;}
</style>
</head>
<body>
<div class="container">
  <h1>Rate the Surprise</h1>
  <p>மீண்டும் ஒரு சிறந்த நினைவாக இது இருக்கிறதா? உங்கள் மதிப்பீட்டும் கருத்தும் இதோடே பகிரவும்.</p>
  <div class="rating-stars" role="radiogroup" aria-label="Star rating">
    <button type="button" data-value="1" aria-label="1 star">★</button>
    <button type="button" data-value="2" aria-label="2 stars">★</button>
    <button type="button" data-value="3" aria-label="3 stars">★</button>
    <button type="button" data-value="4" aria-label="4 stars">★</button>
    <button type="button" data-value="5" aria-label="5 stars">★</button>
  </div>
  <textarea id="reviewText" placeholder="உங்கள் மனதில் என்ன உள்ளது என்பதை இங்கே எழுதவும்..."></textarea>
  <button class="submit" id="submitReview">Submit Review</button>
  <p class="message" id="reviewMessage"></p>
  <div id="thankYouNote" class="thank-you" style="display:none;">மிக நன்றி! உங்கள் ஆர்வம் என் இதயத்தைக் குதூகலமாக மாற்றியது.</div>
</div>
<script>
const starButtons = document.querySelectorAll('.rating-stars button');
const reviewText = document.getElementById('reviewText');
const submitButton = document.getElementById('submitReview');
const reviewMessage = document.getElementById('reviewMessage');
const thankYouNote = document.getElementById('thankYouNote');
let selectedRating = 0;

starButtons.forEach(button => {
  button.addEventListener('click', () => {
    selectedRating = Number(button.dataset.value);
    starButtons.forEach(btn => {
      btn.classList.toggle('selected', Number(btn.dataset.value) <= selectedRating);
    });
    reviewMessage.textContent = '';
  });
});

submitButton.addEventListener('click', () => {
  const review = reviewText.value.trim();
  if (!selectedRating) {
    reviewMessage.textContent = 'Please choose a star rating first.';
    reviewMessage.style.color = '#d81b60';
    return;
  }
  reviewMessage.textContent = `Thank you! You gave ${selectedRating} star${selectedRating > 1 ? 's' : ''}.`;
  reviewMessage.style.color = '#388e3c';
  submitButton.disabled = true;
  submitButton.style.opacity = '0.6';
  starButtons.forEach(btn => btn.disabled = true);
  reviewText.disabled = true;
  thankYouNote.style.display = 'block';
});
</script>
</body>
</html>
