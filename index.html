<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 இனிய பிறந்தநாள் வாழ்த்துகள் 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Background -->
    <div class="background-animation">

        <!-- Hearts -->
        <span class="heart">❤️</span>
        <span class="heart">💕</span>
        <span class="heart">💖</span>
        <span class="heart">💗</span>
        <span class="heart">💝</span>
        <span class="heart">💞</span>

        <!-- Gift Boxes -->
        <span class="gift">🎁</span>
        <span class="gift">🎀</span>
        <span class="gift">🎁</span>
        <span class="gift">🎀</span>

    </div>

    <!-- Sparkles -->
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">✨</div>
    <div class="sparkle s3">⭐</div>
    <div class="sparkle s4">✨</div>

    <!-- Heart Card -->
    <div class="heart-card">

        <div class="content">

            <h1>
                💖 இனிய பிறந்தநாள் வாழ்த்துகள்,<br>
                என்னவனே! 💖
            </h1>

            <p>
                நீ என் வாழ்க்கையின்<br>
                அழகான கவிதை...<br><br>

                இன்று அந்தக் கவிதையின்<br>
                மிக அழகான நாள்.<br><br>

                இந்த சிறிய ஆச்சரியம்<br>
                உனக்காக... ❤️
            </p>

            <button id="startBtn">
                🎁 உனக்கான ஆச்சரியத்தை திற
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
