<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Pattu ❤️</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
    font-family: 'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;align-items:center;justify-content:center;
    padding:18px;overflow:hidden
}

/* Reels-style container */
.reel{
    width:clamp(320px,40vw,540px);
    height:clamp(560px,80vh,900px);
    background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
    border-radius:28px;padding:16px;position:relative;overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.top-info{color:#fff;text-align:center;margin-bottom:8px;z-index:5}
.title{font-size:clamp(18px,3vw,28px);text-shadow:2px 2px 10px rgba(0,0,0,.3)}
.subtitle{font-size:14px;opacity:.95}

.video-wrapper{position:relative;z-index:3;width:100%;height:66%;background:#000;border-radius:18px;overflow:hidden}
video{width:100%;height:100%;object-fit:cover;display:block}

/* Custom controls overlay */
.controls{position:absolute;left:0;right:0;bottom:12px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;z-index:6}
.controls .left, .controls .right{display:flex;gap:8px;align-items:center}
.btn{background:rgba(255,255,255,0.06);backdrop-filter:blur(4px);border-radius:10px;padding:8px;display:inline-flex;align-items:center;justify-content:center;color:#fff;border:1px solid rgba(255,255,255,0.06);cursor:pointer}
.btn:active{transform:scale(.98)}
.play-big{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;background:linear-gradient(135deg,#ff7aa2,#ffb86c);width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.4);cursor:pointer}
.play-big svg{width:36px;height:36px}

/* Like button and animated heart */
.like-area{position:absolute;right:14px;bottom:86px;z-index:6;display:flex;flex-direction:column;align-items:center;gap:12px}
.like-btn{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff,#ffd1dc);cursor:pointer}
.like-btn svg{width:28px;height:28px;fill:#ff2d55}
.heart-pop{position:absolute;transform:translate(-50%,-50%);pointer-events:none}

/* Floating effects containers */
.effects{position:absolute;inset:0;pointer-events:none;z-index:6}
.glitter-container{position:absolute;inset:0;overflow:hidden;z-index:1}
.float-item{position:absolute;opacity:0;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:0}10%{opacity:1}100%{transform:translateY(120vh) rotate(360deg);opacity:0}}

/* Double-tap heart */
.double-heart{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);opacity:0;z-index:7;pointer-events:none;transition:transform .35s ease,opacity .35s}
.double-heart.show{transform:translate(-50%,-50%) scale(1);opacity:1}

/* Footer */
.footer{color:#fff;text-align:center;margin-top:12px;font-size:14px;z-index:5}

/* Responsive tweaks */
@media(min-width:900px){.reel{width:420px;height:760px}}
@media(max-width:420px){body{padding:12px}.reel{width:100%;height:88vh;border-radius:20px}}

/* Small decorative elements */
.gift,.petal,.floating-heart{width:28px;height:28px}

</style>

</head>

<body>

<div class="reel" id="reel">

    <div class="glitter-container" id="glitterContainer"></div>

    <div class="top-info">
        <div class="title">🎂 Happy Birthday, Pattu ❤️</div>
        <div class="subtitle">Made with love, just for you... 💖</div>
    </div>

    <div class="video-wrapper" id="videoWrapper">
        <video id="birthdayVideo" preload="metadata" playsinline>
            <source src="InShot_20260717_142651523.mp4" type="video/mp4">
            Your browser does not support the video.
        </video>

        <div class="play-big" id="bigPlay" title="Play/Pause">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7L8 5z" fill="#fff"/></svg>
        </div>

        <div class="double-heart" id="doubleHeart">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 21s-7-4.35-9-7.5C0 9.5 3 6 6 6c1.8 0 3.1 1.1 4 2 0.9-0.9 2.2-2 4-2 3 0 6 3.5 3 7.5C19 16.65 12 21 12 21z" fill="#ff2d55"/></svg>
        </div>

        <div class="effects">
            <div id="floatingArea"></div>
        </div>

        <div class="controls" id="controls">
            <div class="left">
                <div class="btn" id="rewind" title="Rewind 10s">⏪</div>
                <div class="btn" id="playPause" title="Play/Pause">▶️</div>
                <div class="btn" id="forward" title="Forward 10s">⏩</div>
            </div>
            <div class="right">
                <div class="btn" id="mute" title="Mute/Unmute">🔊</div>
                <div class="btn" id="fullscreen" title="Full Screen">⛶</div>
            </div>
        </div>

        <div class="like-area">
            <div class="like-btn btn" id="likeBtn" title="Like">
                <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-9-7.5C0 9.5 3 6 6 6c1.8 0 3.1 1.1 4 2 0.9-0.9 2.2-2 4-2 3 0 6 3.5 3 7.5C19 16.65 12 21 12 21z"/></svg>
            </div>
        </div>

    </div>

    <div class="footer">❤️ Enjoy every moment... ❤️</div>

</div>

<div id="prePopup" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:20">
    <div style="background:#fff;padding:18px;border-radius:14px;max-width:420px;width:90%;text-align:center;">
        <h3 style="margin-bottom:8px">How much do you love me?</h3>
        <p style="margin-bottom:12px">Tap a heart below to show it!</p>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px">
            <button class="btn" data-love="Like">🙂</button>
            <button class="btn" data-love="A lot">😍</button>
            <button class="btn" data-love="Forever">💖</button>
        </div>
        <div style="font-size:13px;color:#666;margin-bottom:8px">The video will start after you pick one.</div>
        <button id="startVideoBtn" class="btn">Start Video ▶️</button>
    </div>
</div>

<script>
// Elements
const video = document.getElementById('birthdayVideo');
const playPause = document.getElementById('playPause');
const bigPlay = document.getElementById('bigPlay');
const playBtn = playPause;
const rewindBtn = document.getElementById('rewind');
const forwardBtn = document.getElementById('forward');
const muteBtn = document.getElementById('mute');
const fsBtn = document.getElementById('fullscreen');
const likeBtn = document.getElementById('likeBtn');
const doubleHeart = document.getElementById('doubleHeart');
const prePopup = document.getElementById('prePopup');
const startVideoBtn = document.getElementById('startVideoBtn');
const glitterContainer = document.getElementById('glitterContainer');
const floatingArea = document.getElementById('floatingArea');

// Start popup interactions
prePopup.addEventListener('click', (e)=>{
    if(e.target.dataset && e.target.dataset.love){
        // small feedback: create tiny floating heart
        createFloating('heart');
    }
});
startVideoBtn.addEventListener('click', ()=>{
    prePopup.style.display='none';
    safePlay();
});

function safePlay(){
    video.play().catch(()=>{});
    updatePlayIcon();
}

// Controls
playBtn.addEventListener('click', togglePlay);
bigPlay.addEventListener('click', togglePlay);
function togglePlay(){
    if(video.paused){video.play()}else{video.pause()}
    updatePlayIcon();
}

function updatePlayIcon(){
    playBtn.textContent = video.paused ? '▶️' : '⏸️';
    bigPlay.style.display = video.paused ? 'flex' : 'none';
}

rewindBtn.addEventListener('click', ()=>{video.currentTime=Math.max(0,video.currentTime-10)});
forwardBtn.addEventListener('click', ()=>{video.currentTime=Math.min(video.duration||9999,video.currentTime+10)});

muteBtn.addEventListener('click', ()=>{video.muted=!video.muted; muteBtn.textContent = video.muted ? '🔇' : '🔊'});

fsBtn.addEventListener('click', ()=>{ if(document.fullscreenElement){document.exitFullscreen()}else{document.getElementById('reel').requestFullscreen()}});

// Keyboard play/pause space
document.addEventListener('keydown', (e)=>{ if(e.code==='Space'){e.preventDefault(); togglePlay()} });

// Like animation
likeBtn.addEventListener('click', ()=>{popHeart(likeBtn);});

function popHeart(target){
    const rect = target.getBoundingClientRect();
    const heart = document.createElement('div');
    heart.className='heart-pop';
    heart.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24"><path fill="#ff2d55" d="M12 21s-7-4.35-9-7.5C0 9.5 3 6 6 6c1.8 0 3.1 1.1 4 2 0.9-0.9 2.2-2 4-2 3 0 6 3.5 3 7.5C19 16.65 12 21 12 21z"/></svg>';
    document.body.appendChild(heart);
    heart.style.left = (rect.left + rect.width/2) + 'px';
    heart.style.top = (rect.top + rect.height/2) + 'px';
    heart.style.transition = 'transform .9s ease,opacity .9s';
    requestAnimationFrame(()=>{ heart.style.transform='translate(-50%,-150%) scale(1.4)'; heart.style.opacity='1'});
    setTimeout(()=>heart.style.opacity='0',900);
    setTimeout(()=>heart.remove(),1400);
}

// Double-tap to like
let lastTap = 0;
const tapArea = document.getElementById('videoWrapper');
tapArea.addEventListener('touchend', handleTap);
tapArea.addEventListener('click', handleTap);
function handleTap(e){
    const now = Date.now();
    if(now - lastTap < 300){
        // double tap
        doubleHeart.classList.add('show');
        setTimeout(()=>doubleHeart.classList.remove('show'),800);
        popHeart(likeBtn);
    }
    lastTap = now;
}

// Glitter effect (golden dots)
const colors = ['#FFD700','#FFF8DC','#FFFFFF','#FFEB3B','#FFE082'];
for(let i=0;i<80;i++){
    const g=document.createElement('div'); g.className='float-item';
    const size = (Math.random()*6)+3; g.style.width=size+'px'; g.style.height=size+'px';
    g.style.left = Math.random()*100+'%'; g.style.top = (-10 - Math.random()*20)+'%';
    const c = colors[Math.floor(Math.random()*colors.length)]; g.style.background = c; g.style.borderRadius='50%';
    g.style.boxShadow = '0 0 10px '+c+',0 0 20px '+c; g.style.animationDuration=(4+Math.random()*6)+'s'; g.style.animationDelay=(Math.random()*6)+'s';
    glitterContainer.appendChild(g);
}

// Floating hearts, gifts, petals
function createFloating(type){
    const el = document.createElement('div'); el.className='float-item';
    const x = Math.random()*90; el.style.left = x+'%'; el.style.top = (-5-Math.random()*10)+'%';
    el.style.opacity = 0; el.style.animationDuration = (5+Math.random()*6)+'s'; el.style.animationDelay = '0s';
    if(type==='heart'){
        el.innerHTML = '<svg class="floating-heart" viewBox="0 0 24 24"><path fill="#ff6b81" d="M12 21s-7-4.35-9-7.5C0 9.5 3 6 6 6c1.8 0 3.1 1.1 4 2 0.9-0.9 2.2-2 4-2 3 0 6 3.5 3 7.5C19 16.65 12 21 12 21z"/></svg>';
    } else if(type==='gift'){
        el.innerHTML = '<svg class="gift" viewBox="0 0 24 24"><path fill="#ffd166" d="M20 12v7a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-7h16zM12 3l1.1 3.3L16 7l-3 2 1 3-3-2-3 2 1-3L8 7l2.9-.7L12 3z"/></svg>';
    } else { // petal
        el.innerHTML = '<svg class="petal" viewBox="0 0 24 24"><path fill="#f78fb3" d="M12 2s5 2 7 6-3 9-7 14C8 17 3 10 5 6s7-4 7-4z"/></svg>';
    }
    floatingArea.appendChild(el);
    setTimeout(()=>el.remove(),12000);
}

// periodically float items
setInterval(()=>{ const r = Math.random(); if(r<0.45)createFloating('heart'); else if(r<0.7)createFloating('gift'); else createFloating('petal'); },700);

// Confetti on end and redirect
video.addEventListener('ended', ()=>{
    // small confetti: create colorful divs
    for(let i=0;i<80;i++){
        const c = document.createElement('div'); c.style.position='fixed'; c.style.left=(50+Math.random()*60-30)+'%'; c.style.top=(20+Math.random()*40)+'%'; c.style.width='8px'; c.style.height='12px'; c.style.background=['#ff6b6b','#ffd166','#6bcB77','#4d96ff','#ff9f1c'][Math.floor(Math.random()*5)]; c.style.transform='rotate('+Math.random()*360+'deg)'; c.style.zIndex=40; document.body.appendChild(c);
        setTimeout(()=>c.remove(),2500);
    }
    // show brief message then redirect
    setTimeout(()=>{ window.location.href='final.html' },1800);
});

// small helper to keep controls state in sync
video.addEventListener('play', updatePlayIcon); video.addEventListener('pause', updatePlayIcon);

// Initial state: pause until user starts (required on many mobile browsers)
video.pause();

// expose rewind/forward with keyboard arrows
document.addEventListener('keydown', (e)=>{ if(e.key==='ArrowLeft')rewindBtn.click(); if(e.key==='ArrowRight')forwardBtn.click(); });

// Accessibility: show controls on mousemove
let hideTimer; document.getElementById('reel').addEventListener('mousemove', ()=>{ document.getElementById('controls').style.opacity=1; clearTimeout(hideTimer); hideTimer=setTimeout(()=>document.getElementById('controls').style.opacity=0.9,2500)});

</script>

</body>
</html>
